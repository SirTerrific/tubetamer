services:
  tubetamer:
    build: .
    image: tubetamer
    container_name: tubetamer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - BRG_BOT_TOKEN=${BRG_BOT_TOKEN}
      - BRG_ADMIN_CHAT_ID=${BRG_ADMIN_CHAT_ID}
      - BRG_PIN=${BRG_PIN:-}
      - BRG_BASE_URL=${BRG_BASE_URL:-}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - brg_db:/app/db
      - brg_videos:/app/db/videos
    networks:
      - tubetamer

volumes:
  brg_db:
  brg_videos:

networks:
  tubetamer:
    driver: bridge
